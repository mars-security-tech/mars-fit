<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" fill="none">
  <!--
    MARS Seguridad — Isotipo Ā definitivo
    Trazado pixel-perfect del PNG original (822x1084)

    Estructura: dos trazos diagonales gruesos que se CRUZAN.
    El trazo derecho pasa POR ENCIMA del izquierdo.
    Un único hueco pentagonal conecta el canal del cruce
    con el triángulo counter inferior.
    Base sólida continua (sin gap entre pies).

    Rojo macron: fill="#DA0704" (siempre rojo)
    Cuerpo Ā: fill="currentColor" (blanco en dark, negro en light)
  -->

  <!-- Barra roja macron -->
  <rect x="14" y="0" width="72" height="12" fill="#DA0704"/>

  <!-- Ā: contorno exterior + hueco pentagonal interior (evenodd) -->
  <path fill-rule="evenodd" clip-rule="evenodd" fill="currentColor" d="
    M 38 18
    L 62 18
    L 100 130
    L 0 130
    Z

    M 34 37
    L 47 37
    L 72 108
    L 26 108
    L 44 62
    Z
  "/>
</svg>
