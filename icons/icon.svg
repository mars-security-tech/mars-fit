<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" fill="none">
  <!--
    MARS FIT - Isotipo A with macron
    Precise trace from original PNG (822x1084)
    Two crossing diagonal strokes forming the A
    Red macron: #DA0704 (always red)
    Body: currentColor (theme-adaptive)
  -->

  <!-- Red macron bar -->
  <rect x="15" y="0" width="70" height="12.5" fill="#DA0704"/>

  <!--
    Compound path with evenodd fill:
      Sub-path 1 (CW): Outer A silhouette
      Sub-path 2 (CCW): Interior pentagon counter with crossing kink
      Sub-path 3 (CCW): Foot gap between legs at base
  -->
  <path fill-rule="evenodd" clip-rule="evenodd" fill="currentColor" d="
    M 40 20
    L 59 20
    L 100 130
    L 0 130
    Z

    M 35 38
    L 44 63
    L 26 110
    L 73 110
    L 47 38
    Z

    M 20.5 115
    L 30.5 115
    L 33.5 130
    L 18 130
    Z
  "/>
</svg>
